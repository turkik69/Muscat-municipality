<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بلدية المستقبل</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;font-family:system-ui,'Cairo',sans-serif;height:100vh;overflow:hidden}
#start{position:fixed;inset:0;background:#0F2A3D;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;color:#fff;text-align:center;padding:20px}
#start h1{font-size:42px;margin:0}#start p{opacity:.7;font-size:14px;max-width:400px}
#goBtn{background:#C8961E;color:#081A26;border:none;padding:16px 40px;border-radius:12px;font-size:18px;font-weight:800;margin-top:20px;cursor:pointer;touch-action:manipulation}
#game{position:fixed;inset:0;display:none;flex-direction:column}
.top{height:56px;background:#0F2A3D;border-bottom:2px solid #C8961E;display:flex;align-items:center;padding:0 12px;color:#fff;gap:8px}
#map{flex:1}.side{width:320px;background:#fff;border-left:1px solid #ddd;display:flex;flex-direction:column}
.wrap{display:flex;flex:1;overflow:hidden}.task{margin:8px;padding:10px;background:#F5F0E6;border-radius:8px;border-right:4px solid #0F2A3D}
.b{width:100%;padding:8px;background:#2D6A4F;color:#fff;border:none;border-radius:8px;font-weight:700;margin-top:6px;cursor:pointer}
</style>
</head>
<body>
<div id="start">
<h1>بلدية المستقبل</h1>
<p>محافظة مسقط - الخريطة صارت واقعية</p>
<button id="goBtn" onclick="enterGame()" ontouchstart="enterGame()">🚀 ادخل مباشرة - اضغط هنا</button>
<div style="margin-top:12px;font-size:11px;opacity:.5">اذا ما اشتغل المس ثم حرك اصبعك</div>
</div>

<div id="game">
<div class="top"><b>بلدية مسقط</b><div style="margin-right:auto;display:flex;gap:6px"><span>💰 <b id="m1">50000</b></span><span>⭐ <b id="m2">75%</b></span></div></div>
<div class="wrap"><div id="map"></div><div class="side"><div style="padding:10px;font-weight:800;border-bottom:1px solid #eee">المهام</div><div id="list" style="flex:1;overflow:auto;padding:8px"></div></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
function enterGame(){
console.log('click');
document.getElementById('start').style.display='none';
let g=document.getElementById('game');g.style.display='flex';
setTimeout(init,300);
}
let map,money=50000,rep=75,tasks=[];
function init(){
if(map) return;
map=L.map('map').setView([23.60,58.38],11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
let areas=[["روي",23.587,58.545],["الخوير",23.585,58.42],["القرم",23.62,58.48],["السيب",23.67,58.19],["بوشر",23.56,58.38],["مطرح",23.615,58.565]];
areas.forEach(a=>{
let ic=L.divIcon({html:`<div style="background:#0F2A3D;color:#fff;border:2px solid #C8961E;padding:6px 12px;border-radius:20px;font-weight:700;font-size:12px">📍 ${a[0]}</div>`});
L.marker([a[1],a[2]],{icon:ic}).addTo(map).on('click',()=>add(a[0]));
});
render();
}
function add(name){if(tasks.length>=5){alert('عندك 5 مهام');return}let t={id:Date.now(),name,iss:"بلاغ في "+name,price:5000};tasks.push(t);render();}
function render(){document.getElementById('m1').innerText=money;let c=document.getElementById('list');c.innerHTML=tasks.length? '': '<div style="text-align:center;color:#999;padding:20px">اضغط على الخريطة</div>';tasks.forEach(x=>{c.innerHTML+=`<div class="task"><b>${x.iss}</b><div style="font-size:11px;color:#666">📍 ${x.name}</div><button class="b" onclick="done(${x.id})">انهاء المهمة</button></div>`});}
function done(id){let t=tasks.find(x=>x.id==id);tasks=tasks.filter(x=>x.id!=id);money+=t.price;render();}
</script>
</body>
</html>
