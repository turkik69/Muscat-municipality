<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بلدية المستقبل | مسقط</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Cairo',sans-serif;height:100vh;overflow:hidden;background:#F5F0E6}
.screen{position:absolute;inset:0;display:flex;z-index:10}.hidden{display:none!important}
#startScreen{background:#0F2A3D;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;text-align:center}
#startScreen h1{color:#fff;font-size:38px;font-weight:900} #startScreen .sub{color:#E0B84A}
.pitch{color:rgba(255,255,255,.7);font-size:13px;line-height:1.8;max-width:500px}
.role-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:520px;margin-top:10px}
.role-card{background:rgba(255,255,255,.07);border:1.5px solid rgba(200,150,30,.3);border-radius:10px;padding:12px;cursor:pointer;color:#fff}
.role-card.selected{border-color:#C8961E;background:rgba(200,150,30,.2)}
.start-btn{margin-top:12px;background:#C8961E;color:#081A26;border:none;padding:14px 44px;border-radius:10px;font-family:'Cairo';font-weight:800;font-size:16px;cursor:pointer}
#gameScreen{flex-direction:column;background:#F5F0E6}
.topbar{height:56px;background:#0F2A3D;border-bottom:2px solid #C8961E;display:flex;align-items:center;padding:0 14px;gap:10px;color:#fff;flex-shrink:0}
.stats{margin-right:auto;display:flex;gap:6px}.st{background:rgba(255,255,255,.12);padding:5px 10px;border-radius:8px;font-size:12px}.st b{color:#E0B84A}
.main{flex:1;display:flex;overflow:hidden;position:relative} #map{flex:1;height:100%}
.sidebar{width:340px;background:#fff;border-right:1px solid #E8DFC9;display:flex;flex-direction:column;flex-shrink:0}
.tabs{display:flex;background:#F5F0E6}.tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;color:#888;border-bottom:2px solid transparent}.tab.active{color:#0F2A3D;border-color:#C8961E;background:#fff}
.content{flex:1;overflow-y:auto;padding:12px}
.task{background:#F5F0E6;border:1px solid #E8DFC9;border-right:4px solid #0F2A3D;border-radius:8px;padding:10px;margin-bottom:8px}
.btn{width:100%;padding:8px;border:none;border-radius:8px;font-family:'Cairo';font-weight:700;font-size:12px;cursor:pointer;margin-top:6px} .btn-go{background:#2D6A4F;color:#fff} .btn-take{background:#0F2A3D;color:#fff}
#toast{position:fixed;top:70px;left:14px;z-index:99;display:flex;flex-direction:column;gap:8px}
.toast{background:#0F2A3D;color:#fff;padding:10px 14px;border-radius:8px;font-size:12px;border-right:4px solid #C8961E}
#panel{position:absolute;bottom:14px;right:14px;left:354px;background:#fff;border-radius:12px;padding:14px;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:20;display:none;max-width:380px} #panel.show{display:block}
@media(max-width:720px){.sidebar{position:absolute;inset:0;z-index:30;display:none;width:100%}.sidebar.open{display:flex}#panel{left:14px}}
</style>
</head>
<body>
<div id="startScreen" class="screen">
<h1>بلدية المستقبل</h1><div class="sub">محافظة مسقط</div>
<p class="pitch">الخريطة كانت فاضية، الحين صارت مليانة بلاغات واقعية من مسقط. اختر دورك وادخل.</p>
<div class="role-grid" id="grid"></div>
<button id="go" class="start-btn">🚀 ابدأ المهمة - ادخل مباشرة</button>
<p style="color:rgba(255,255,255,.4);font-size:11px;margin-top:8px">اذا ما اخترت دور بتدخل كـ رئيس بلدية تلقائياً</p>
</div>

<div id="gameScreen" class="screen hidden">
<div class="topbar"><b>بلدية مسقط</b> <span id="rn" style="background:rgba(200,150,30,.2);border:1px solid #C8961E;color:#E0B84A;padding:3px 10px;border-radius:20px;font-size:11px">رئيس البلدية</span>
<div class="stats"><div class="st">💰 <b id="b">50,000</b></div><div class="st">⭐ <b id="r">75%</b></div><div class="st">📋 <b id="t">0</b></div></div>
<button onclick="document.getElementById('sb').classList.toggle('open')" style="background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:8px">☰</button>
</div>
<div class="main"><div id="map"></div>
<div class="sidebar" id="sb"><div class="tabs"><div class="tab active" onclick="tab('tasks')">المهام</div><div class="tab" onclick="tab('log')">السجل</div></div>
<div class="content"><div id="c-tasks"><div id="tasks"></div></div><div id="c-log" class="hidden"><div id="log"></div></div></div></div>
<div id="panel"></div></div></div>
<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let sel={name:'رئيس البلدية'},budget=50000,rep=75,tasks=[],map;
const ROLES=[{name:'رئيس البلدية',i:'🏛️'},{name:'مهندس',i:'👷'},{name:'مفتش',i:'🔍'},{name:'مسؤول بيئة',i:'🌿'}];
const AREAS=[
{name:"روي",lat:23.587,lng:58.545,iss:["حفرة خطيرة","إنارة معطلة"]},
{name:"الخوير",lat:23.585,lng:58.42,iss:["ازدحام حفريات","تصريح بناء"]},
{name:"القرم",lat:23.62,lng:58.48,iss:["حديقة تحتاج صيانة","كسر أنبوب"]},
{name:"السيب",lat:23.67,lng:58.19,iss:["تجمع مياه أمطار","بناء مخالف"]},
{name:"بوشر",lat:23.56,lng:58.38,iss:["رصيف مكسر","بلاغ نظافة"]},
{name:"مطرح",lat:23.615,lng:58.565,iss:["تنظيم سوق مطرح","كورنيش"]}
];
let g=document.getElementById('grid');
ROLES.forEach(r=>{let d=document.createElement('div');d.className='role-card';d.innerHTML=r.i+' '+r.name;d.onclick=()=>{document.querySelectorAll('.role-card').forEach(x=>x.classList.remove('selected'));d.classList.add('selected');sel=r};g.appendChild(d)});

document.getElementById('go').onclick=start;
function start(){
document.getElementById('startScreen').classList.add('hidden');
let gs=document.getElementById('gameScreen');gs.classList.remove('hidden');gs.style.display='flex';
document.getElementById('rn').innerText=sel.name;
setTimeout(initMap,300);
}
function initMap(){
if(map) return;
map=L.map('map',{zoomControl:false}).setView([23.6,58.38],11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
AREAS.forEach(a=>{let iss=a.iss[Math.floor(Math.random()*a.iss.length)];
let ic=L.divIcon({html:`<div style="background:#0F2A3D;color:#fff;border:2px solid #C8961E;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700">📍 ${a.name}</div>`,iconSize:[100,30]});
L.marker([a.lat,a.lng],{icon:ic}).addTo(map).on('click',()=>openP(a,iss));
});toast('تم تحميل 6 مناطق في مسقط - اضغط عليها');render();
}
function openP(a,iss){let rw=iss.includes('خطيرة')?8000:4000;let p=document.getElementById('panel');p.innerHTML=`<div style="display:flex;justify-content:space-between"><b>📍 ${a.name} - ${iss}</b><span onclick="panel.classList.remove('show')" style="cursor:pointer">✕</span></div><div style="font-size:12px;color:#666;margin:8px 0">مكافأة: ${rw} ر.ع</div><button class="btn btn-take" onclick="take('${a.name}','${iss}',${rw})">استلام المهمة</button>`;p.classList.add('show');}
function take(ar,ti,rw){if(tasks.length>=5){toast('خلص مهامك أولاً');return}tasks.push({id:Date.now(),ar,ti,rw});render();
