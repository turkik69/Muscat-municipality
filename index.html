<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>بلدية المستقبل | مسقط - النسخة الواقعية</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#0F2A3D;--gold:#C8961E;--gold-light:#E0B84A;--green:#2D6A4F;--red:#B23A2E;--cream:#F5F0E6;--cream-dark:#E8DFC9}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Cairo',sans-serif;height:100vh;overflow:hidden;background:var(--cream)}
.screen{position:fixed;inset:0;display:flex;z-index:10}.hidden{display:none!important}
#start{background:linear-gradient(180deg,#081A26,#0F2A3D);flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px;text-align:center}
#start h1{color:#fff;font-size:40px;font-weight:900} #start .sub{color:var(--gold-light);letter-spacing:2px} .pitch{color:rgba(255,255,255,.7);font-size:13px;max-width:520px;line-height:1.8}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:560px}
.card{background:rgba(255,255,255,.06);border:1.5px solid rgba(200,150,30,.25);border-radius:12px;padding:12px;cursor:pointer;text-align:right;transition:.15s}
.card.selected{border-color:var(--gold);background:rgba(200,150,30,.18);transform:translateY(-2px)} .card b{color:#fff;font-size:13px;display:block} .card small{color:rgba(255,255,255,.5);font-size:11px}
.go{background:linear-gradient(135deg,var(--gold),#A67C12);color:#081A26;border:none;padding:14px 42px;border-radius:12px;font-family:'Cairo';font-weight:800;font-size:17px;cursor:pointer;box-shadow:0 6px 20px rgba(200,150,30,.3);touch-action:manipulation}
#game{flex-direction:column;background:var(--cream)}
.top{height:58px;background:var(--navy);border-bottom:2px solid var(--gold);display:flex;align-items:center;padding:0 14px;gap:10px;color:#fff;flex-shrink:0}
.chip{background:rgba(200,150,30,.15);border:1px solid var(--gold);color:var(--gold-light);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.stats{margin-right:auto;display:flex;gap:6px;flex-wrap:wrap} .st{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);padding:5px 10px;border-radius:8px;font-size:12px} .st b{color:var(--gold-light)}
.main{flex:1;display:flex;overflow:hidden;position:relative} #map{flex:1}
.sidebar{width:360px;background:#fff;border-right:2px solid var(--cream-dark);display:flex;flex-direction:column;box-shadow:-4px 0 15px rgba(0,0,0,.05)}
.tabs{display:flex;background:var(--cream);border-bottom:1px solid var(--cream-dark)} .tab{flex:1;padding:11px;text-align:center;font-size:12px;font-weight:700;color:#8a8478;cursor:pointer;border-bottom:2.5px solid transparent} .tab.active{color:var(--navy);border-color:var(--gold);background:#fff}
.content{flex:1;overflow-y:auto;padding:12px} .sec{font-size:12px;font-weight:800;color:var(--navy);margin:12px 0 6px;display:flex;gap:6px;align-items:center} .sec:first-child{margin-top:0} .dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
.task{background:var(--cream);border:1px solid var(--cream-dark);border-right:4px solid var(--navy);border-radius:9px;padding:10px;margin-bottom:8px}
.task.urgent{border-right-color:var(--red);background:#fdf2f1} .task b{font-size:13px} .task small{color:#888;font-size:11px;display:block;margin:3px 0}
.badge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;display:inline-block} .urgent-b{background:#fdeceb;color:var(--red)} .normal-b{background:#eef4f0;color:var(--green)}
.btn{width:100%;padding:8px;border:none;border-radius:8px;font-family:'Cairo';font-weight:700;font-size:12px;cursor:pointer;margin-top:6px} .btn-go{background:var(--green);color:#fff} .btn-take{background:var(--navy);color:#fff}
#panel{position:absolute;bottom:16px;right:16px;left:376px;max-width:420px;background:#fff;border-radius:14px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.22);z-index:20;display:none} #panel.show{display:block}
#toasts{position:fixed;top:70px;left:14px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none} .toast{background:var(--navy);color:#fff;padding:11px 14px;border-radius:10px;font-size:12px;font-weight:600;border-right:4px solid var(--gold);box-shadow:0 6px 18px rgba(0,0,0,.2);animation:in .3s}
@keyframes in{from{transform:translateX(-20px);opacity:0}to{transform:none;opacity:1}}
@media(max-width:760px){.sidebar{position:absolute;inset:0;z-index:30;display:none;width:100%} .sidebar.open{display:flex} #panel{left:14px}}
</style>
</head>
<body>
<div id="start" class="screen">
<h1>بلدية المستقبل</h1><div class="sub">MUSCAT MUNICIPALITY SIM</div>
<p class="pitch">النسخة الواقعية: الميزانية محدودة، السمعة تنزل مع التأخير، وبلاغات حقيقية من أحياء
