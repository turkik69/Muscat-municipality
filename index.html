<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>بلدية المستقبل - مسقط | النسخة الواقعية</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#0F2A3D;--gold:#C8961E;--gold-light:#E0B84A;--green:#2D6A4F;--red:#B23A2E;--cream:#F5F0E6}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Cairo',sans-serif;height:100vh;overflow:hidden;background:var(--cream)}
#game{display:flex;flex-direction:column;height:100vh}
.top{height:58px;background:var(--navy);color:#fff;display:flex;align-items:center;padding:0 14px;gap:10px;border-bottom:2px solid var(--gold);flex-shrink:0}
.top b{font-size:15px}.stats{margin-right:auto;display:flex;gap:6px}.st{background:rgba(255,255,255,.12);padding:4px 10px;border-radius:8px;font-size:12px}.st b{color:var(--gold-light)}
.wrap{flex:1;display:flex;overflow:hidden;position:relative}
#map{flex:1;background:#ddd}
.side{width:340px;background:#fff;border-right:2px solid #E8DFC9;display:flex;flex-direction:column;flex-shrink:0;z-index:5}
.side-head{padding:12px;background:var(--cream);border-bottom:1px solid #E8DFC9;font-weight:800;color:var(--navy);font-size:13px;text-align:center}
#list{flex:1;overflow-y:auto;padding:10px}
.task{background:var(--cream);border:1px solid #E8DFC9;border-right:4px solid var(--navy);padding:10px;border-radius:10px;margin-bottom:8px}
.task.urgent{border-right-color:var(--red);background:#fdf2f1}
.task b{font-size:13px;color:var(--navy);display:block;margin-bottom:3px}
.task small{font-size:11px;color:#777}
.btn{width:100%;padding:10px;border:none;border-radius:9px;font-family:'Cairo';font-weight:800;font-size:13px;cursor:pointer;margin-top:7px;touch-action:manipulation}
.btn-take{background:var(--navy);color:#fff}.btn-go{background:var(--green);color:#fff}
#panel{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:92%;max-width:400px;background:#fff;border-radius:18px;padding:16px;box-shadow:0 15px 40px rgba(0,0,0,.35);z-index:1000;display:none;border:2px solid var(--gold)}
#panel.show{display:block;animation:pop .28s ease}
@keyframes pop{from{transform:translateX(-50%) translateY(20px) scale(.92);opacity:0}to{transform:translateX(-50%) translateY(0) scale(1);opacity:1}}
