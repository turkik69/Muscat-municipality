<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بلدية المستقبل | مسقط</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#0F2A3D;--gold:#C8961E;--gold-light:#E0B84A;--green:#2D6A4F;--red:#B23A2E;--cream:#F5F0E6;--cream-dark:#E8DFC9;}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Cairo',sans-serif;background:var(--cream);height:100vh;overflow:hidden}
.screen{position:absolute;inset:0;display:flex;z-index:10}.hidden{display:none!important}
#startScreen{background:linear-gradient(180deg,#081A26 0%,#0F2A3D 100%);flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:18px;overflow-y:auto}
#startScreen h1{color:#fff;font-size:36px;font-weight:900}.sub{color:var(--gold-light)} .pitch{color:rgba(255,255,255,.7);text-align:center;max-width:500px;font-size:13px;line-height:1.8}
.role-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:600px}
.role-card{background:rgba(255,255,255,.05);border:1px solid rgba(200,150,30,.3);border-radius:10px;padding:12px;cursor:pointer;text-align:right}
.role-card.selected{border-color:var(--gold);background:rgba(200,150,30,.15)} .role-card b{color:#fff;font-size:13px;display:block} .role-card span{color:rgba(255,255,255,.5);font-size:11px}
.start-btn{margin-top:10px;background:var(--gold);color:#081A26;border:none;padding:14px 40px;border-radius:10px;font-family:'Cairo';font-weight:800;font-size:16px;cursor:pointer}
.start-btn:disabled{opacity:.3}
#gameScreen{flex-direction:column}
.topbar{height:56px;background:var(--navy);border-bottom:2px solid var(--gold);display:flex;align-items:center;padding:0 14px;gap:10px;color:#fff}
.topbar .stats{margin-right:auto;display:flex;gap:8px}
.stat{background:rgba(255,255,255,.1);padding:5px 10px;border-radius:8px;font-size:12px}
.stat b{color:var(--gold-light)}
.main{display:flex;flex:1;overflow:hidden;position:relative}
#map{flex:1}
.sidebar{width:340px;background:#fff;border-right:1px solid var(--cream-dark);display:flex;flex-direction:column}
.tabs{display:flex;background:var(--cream);border-bottom:1px solid var(--cream-dark)}
.tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;color:#888;border-bottom:2px solid transparent}
.tab.active{color:var(--navy);border-color:var(--gold);background:#fff}
.content{flex:1;overflow-y:auto;padding:12px}
.task{background:var(--cream);border:1px solid var(--cream-dark);border-right:4px solid var(--navy);border-radius:8px;padding:10px;margin-bottom:8px}
.task b{font-size:13px;display:block;margin-bottom:4px} .task small{color:#888;font-size:11px}
.btn{width:100%;padding:8px;border:none;border-radius:8px;font-family:'Cairo';font-weight:700;font-size:12px;cursor:pointer;margin-top:6px}
.btn-go{background:var(--green);color:#fff} .btn-take{background:var(--navy);color:#fff}
#toastWrap{position:fixed;top:70px;left:14px;z-index:99;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#0F2A3D;color:#fff;padding:10px 14px;border-radius:8px;font-size:12px;border-right:4px solid var(--gold);box-shadow:0 4px 15px rgba(0,0,0,.2)}
#panel{position:absolute;bottom:14px;right:14px;left:354px;background:#fff;border-radius:12px;padding:14px;box-shadow:0 8px 20px rgba(0,0,0,.2);z-index:20;display:none;max-width:400px}
#panel.show{display:block}
@media(max-width:700px){.sidebar{position:absolute;inset:0;z-index:30;display:none;width:100%}.sidebar.open{display:flex}#panel{left:14px}}
</style>
</head>
<body>
<div id="app">
<div id="startScreen" class="screen">
<h1>بلدية المستقبل</h1><div class="sub">محافظة مسقط</div>
<p class="pitch">الخريطة كانت فاضية، الحين مليانة بلاغات حقيقية من <b style="color:var(--gold-light)">مسقط</b>. اختر دورك وابدأ.</p>
<div class="role-grid" id="roleGrid"></div>
<button id="startBtn" class="start-btn" disabled>ابدأ المهمة 🚀</button>
</div>

<div id="gameScreen" class="screen hidden">
<div class="topbar">
<b>بلدية مسقط</b> <span id="roleName" style="background:rgba(200,150,30,.2);border:1px solid var(--gold);color:var(--gold-light);padding:3px 10px;border-radius:20px;font-size:11px">-</span>
<div class="stats">
<div class="stat">💰 <b id="b1">50,000</b></div>
<div class="stat">⭐ <b id="r1">75%</b></div>
<div class="stat">📋 <b id="t1">0</b></div>
</div>
<button onclick="document.getElementById('sidebar').classList.toggle('open')" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;width:34px;height:34px;border-radius:8px;cursor:pointer">☰</button>
</div>
<div class="main">
<div id="map"></div>
<div class="sidebar" id="sidebar">
<div class="tabs"><div class="tab active" onclick="showTab('tasks')">المهام</div><div class="tab" onclick="showTab('log')">السجل</div></div>
<div class="content">
<div id="tab-tasks"><div id="tasks"></div></div>
<div id="tab-log" class="hidden"><div id="log" style="font-size:12px;color:#666"></div></div>
</div>
</div>
<div id="panel"></div>
</div>
</div>
<div id="toastWrap"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const ROLES=[{id:'mayor',name:'رئيس البلدية',icon:'🏛️'},{id:'eng',name:'مهندس',icon:'👷'},{id:'insp',name:'مفتش',icon:'🔍'},{id:'env',name:'بيئة',icon:'🌿'}];
const AREAS=[
{name:"روي",lat:23.587,lng:58.545,issues:["حفرة خطيرة","إنارة معطلة","نفايات متراكمة"]},
{name:"الخوير",lat:23.585,lng:58.42,issues:["ازدحام حفريات","تصريح بناء"]},
{name:"القرم",lat:23.62,lng:58.48,issues:["حديقة تحتاج صيانة","كسر أنبوب ماء"]},
{name:"السيب",lat:23.67,lng:58.19,issues:["تجمع مياه أمطار","بناء مخالف"]},
{name:"بوشر",lat:23.56,lng:58.38,issues:["رصيف مكسر","كلاب ضالة"]},
{name:"مطرح",lat:23.615,lng:58.565,issues:["تنظيم سوق مطرح","كورنيش يحتاج تنظيف"]}
];
let sel=null,budget=50000,rep=75,tasks=[],map;

const grid=document.getElementById('roleGrid');
ROLES.forEach(r=>{
let d=document.createElement('div');d.className='role-card';d.innerHTML=`<b>${r.icon} ${r.name}</b><span>اضغط للاختيار</span>`;
d.onclick=()=>{document.querySelectorAll('.role-card').forEach(x=>x.classList.remove('selected'));d.classList.add('selected');sel=r;document.getElementById('startBtn').disabled=false};
grid.appendChild(d);
});

document.getElementById('startBtn').onclick=()=>{
document.getElementById('startScreen').classList.add('hidden');
document.getElementById('gameScreen').classList.remove('hidden');
document.getElementById('roleName').innerText=sel.name;
setTimeout(init,200);
};

function init(){
map=L.map('map',{zoomControl:false}).setView([23.6,58.38],11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
AREAS.forEach(a=>{
let issue=a.issues[Math.floor(Math.random()*a.issues
